name: HiddenAdventures

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: true
    MARKETING_VERSION: 0.1
    STRING_CATALOG_GENERATE_SYMBOLS: true
    SWIFT_VERSION: "5.0"

targets:
  HiddenAdventures:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
        excludes:
          - README.md
      - path: Resources
        buildPhase: resources
        excludes:
          - .gitkeep
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Hidden Adventures uses your location to center the explore map around you.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        PRODUCT_BUNDLE_IDENTIFIER: com.hiddenadventures.ios
        TARGETED_DEVICE_FAMILY: 1

  HiddenAdventuresUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: UITests
    dependencies:
      - target: HiddenAdventures
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.hiddenadventures.ios.uitests

  HiddenAdventuresTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
    dependencies:
      - target: HiddenAdventures
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.hiddenadventures.ios.tests

schemes:
  HiddenAdventures:
    build:
      targets:
        HiddenAdventures: all
    run:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: live
        HA_SERVER_MODE: local_automation
    test:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: fixture
        HA_SERVER_MODE: local_automation
      testPlans:
        - path: UITests/TestPlans/LocalDev.xctestplan
          defaultPlan: true
        - path: UITests/TestPlans/FullRegression.xctestplan
      targets:
        - name: HiddenAdventuresTests
        - name: HiddenAdventuresUITests
    archive:
      config: Release
  HiddenAdventures-LocalManualQA:
    build:
      targets:
        HiddenAdventures: all
    run:
      config: Debug
      environmentVariables:
        HA_COGNITO_CLIENT_ID: 31eceuulc207bqis2n6cdqoj01
        HA_COGNITO_REGION: us-west-2
        HA_RUNTIME_MODE: live
        HA_SERVER_MODE: local_manual_qa
    test:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: fixture
        HA_SERVER_MODE: local_manual_qa
      testPlans:
        - path: UITests/TestPlans/LocalDev.xctestplan
          defaultPlan: true
        - path: UITests/TestPlans/FullRegression.xctestplan
      targets:
        - name: HiddenAdventuresTests
        - name: HiddenAdventuresUITests
    archive:
      config: Release
  HiddenAdventures-LocalAutomation:
    build:
      targets:
        HiddenAdventures: all
    run:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: live
        HA_SERVER_MODE: local_automation
    test:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: fixture
        HA_SERVER_MODE: local_automation
      testPlans:
        - path: UITests/TestPlans/LocalDev.xctestplan
          defaultPlan: true
        - path: UITests/TestPlans/FullRegression.xctestplan
      targets:
        - name: HiddenAdventuresTests
        - name: HiddenAdventuresUITests
    archive:
      config: Release
  HiddenAdventures-Production:
    build:
      targets:
        HiddenAdventures: all
    run:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: live
        HA_SERVER_MODE: production
    test:
      config: Debug
      environmentVariables:
        HA_RUNTIME_MODE: fixture
        HA_SERVER_MODE: production
      testPlans:
        - path: UITests/TestPlans/LocalDev.xctestplan
          defaultPlan: true
        - path: UITests/TestPlans/FullRegression.xctestplan
      targets:
        - name: HiddenAdventuresTests
        - name: HiddenAdventuresUITests
    archive:
      config: Release
